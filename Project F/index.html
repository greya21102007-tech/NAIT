<!DOCTYPE html>
<html>
<head>
    <title> HTML Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff9a9e, #fad0c4, #a18cd1);
            color: white;
        }

        .container {
            margin: 100px auto;
            width: 70%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 50px;
            text-shadow: 3px 3px 8px black;
        }

        p {
            font-size: 22px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #ff4b5c;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #6a11cb;
            transform: scale(1.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome ✨</h1>
        <p>This is a HTML Web Page</p>
        <button>Click Me</button>
        <div class="footer">
            Designed with HTML & CSS 💖
        </div>
    </div>

</body>
</html>
